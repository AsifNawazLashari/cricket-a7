name: Build Flutter APK

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.19.x'

      - name: Generate Android Project Safely
        run: |
          # Backup our custom code
          mv lib lib_backup
          # Generate Android files
          flutter create . --platforms android --org com.ashescricket.app
          # Restore our custom code
          rm -rf lib
          mv lib_backup lib

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: Ashes-Cricket-APK
          path: build/app/outputs/flutter-apk/app-release.apk
