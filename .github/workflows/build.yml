name: Build Flutter APK

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.19.0'

      - name: Generate Project and Sync Pubspec
        run: |
          # 1. Move our code out of the way
          mv lib lib_backup
          
          # 2. Re-create the Android project (fixes all hidden hyphen/name issues)
          flutter create . --project-name ashes_cricket --platforms android --org com.ashescricket.app
          
          # 3. Put our custom code back
          rm -rf lib
          mv lib_backup lib
          
          # 4. Generate a FRESH pubspec.yaml with PERFECT indentation
          cat << 'PUBSPEC' > pubspec.yaml
name: ashes_cricket
description: Professional Ashes Cricket Scoring App
publish_to: 'none'
version: 1.0.0+1
environment:
  sdk: '>=3.0.0 <4.0.0'
dependencies:
  flutter:
    sdk: flutter
  http: ^1.1.0
  shared_preferences: ^2.2.2
  web_socket_channel: ^2.4.0
  google_fonts: ^6.1.0
  provider: ^6.1.1
  lucide_icons: ^0.1.2
flutter:
  uses-material-design: true
PUBSPEC

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Ashes-Cricket-APK
          path: build/app/outputs/flutter-apk/app-release.apk
