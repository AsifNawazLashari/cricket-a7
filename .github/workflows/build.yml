name: Build Flutter APK

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.19.0'

      - name: Generate Android Project Safely
        run: |
          # 1. Backup our custom code and config
          [ -d lib ] && mv lib lib_backup
          [ -f pubspec.yaml ] && mv pubspec.yaml pubspec_backup.yaml
          
          # 2. Force generate the Android project with a VALID project name (no hyphens!)
          flutter create . --project-name ashes_cricket --platforms android --org com.ashescricket.app
          
          # 3. Restore our custom code and original pubspec
          rm -rf lib
          [ -d lib_backup ] && mv lib_backup lib
          
          # 4. Correct the pubspec (ensuring the name matches the generated project)
          if [ -f pubspec_backup.yaml ]; then
            sed -i 's/name: .*/name: ashes_cricket/' pubspec_backup.yaml
            mv pubspec_backup.yaml pubspec.yaml
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Ashes-Cricket-APK
          path: build/app/outputs/flutter-apk/app-release.apk
