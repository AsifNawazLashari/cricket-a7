name: Build Flutter APK

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.19.0'

      - name: Generate Project and Sync Pubspec
        run: |
          mv lib lib_backup
          flutter create . --project-name ashes_cricket --platforms android --org com.ashescricket.app
          rm -rf lib
          mv lib_backup lib
          
          # Use printf to create pubspec to avoid heredoc indentation issues
          printf "name: ashes_cricket\ndescription: Professional Ashes Cricket Scoring App\npublish_to: 'none'\nversion: 1.0.0+1\nenvironment:\n  sdk: '>=3.0.0 <4.0.0'\ndependencies:\n  flutter:\n    sdk: flutter\n  http: ^1.1.0\n  shared_preferences: ^2.2.2\n  web_socket_channel: ^2.4.0\n  google_fonts: ^6.1.0\n  provider: ^6.1.1\n  lucide_icons: ^0.1.2\nflutter:\n  uses-material-design: true\n" > pubspec.yaml

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Ashes-Cricket-APK
          path: build/app/outputs/flutter-apk/app-release.apk
